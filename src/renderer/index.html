<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveGit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#0a0e14;--bg1:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--border2:#3d444d;
  --t1:#e6edf3;--t2:#8b949e;--t3:#6e7681;--t4:#484f58;
  --blue:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#d29922;--purple:#bc8cff;--cyan:#39d2c0;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg0);color:var(--t1);display:flex;flex-direction:column;user-select:none}
*::selection{background:rgba(88,166,255,.3)}

.titlebar{display:flex;align-items:center;height:38px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;-webkit-app-region:drag;padding:0 12px}
.titlebar-dots{display:flex;gap:8px;margin-right:16px;-webkit-app-region:no-drag}
.titlebar-dot{width:13px;height:13px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .15s}
.titlebar-dot:hover{color:rgba(0,0,0,.7)}
.dot-close{background:#f85149}.dot-close:hover{background:#ff6e64}
.dot-min{background:#d29922}.dot-min:hover{background:#e5b34a}
.dot-max{background:#3fb950}.dot-max:hover{background:#56d364}
.titlebar-title{flex:1;text-align:center;font-size:13px;font-weight:600;color:var(--t2);letter-spacing:.5px}
.titlebar-path{font-size:11px;color:var(--t3);margin-left:auto;font-family:'Cascadia Code','Consolas',monospace;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0}
.toolbar button{padding:7px 16px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--t1);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.toolbar button:hover{background:var(--bg4);border-color:var(--border2)}
.toolbar button.primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
.toolbar button.primary:hover{background:#388bfd}
.toolbar .repo-name{font-size:13px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px}
.toolbar .repo-name .branch{font-size:11px;padding:3px 10px;border-radius:12px;background:rgba(88,166,255,.15);color:var(--blue);font-weight:600}
.search-box{display:flex;align-items:center;gap:6px;margin-left:auto}
.search-box input{padding:6px 12px;background:var(--bg0);border:1px solid var(--border);border-radius:6px;color:var(--t1);font-size:12px;width:220px;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--blue)}
.search-box input::placeholder{color:var(--t4)}

.info-strip{display:flex;align-items:center;gap:20px;padding:6px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;font-size:12px}
.info-chip{display:flex;align-items:center;gap:5px;color:var(--t2)}
.info-chip b{color:var(--t1);font-weight:600}
.info-chip.live{color:var(--green);font-weight:700;margin-left:auto}
.pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,185,80,.6)}70%{box-shadow:0 0 0 7px rgba(63,185,80,0)}100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}}

.tabs{display:flex;gap:0;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.tab{padding:9px 14px;background:none;border:none;color:var(--t3);font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--t1)}
.tab.active{color:var(--t1);border-bottom-color:var(--blue)}

.main{flex:1;overflow:hidden;position:relative}
.panel{display:none;height:100%;overflow-y:auto;padding:12px 16px}
.panel.active{display:block}

.welcome{display:flex;align-items:center;justify-content:center;height:100%;text-align:center}
.welcome-inner{opacity:.6}
.welcome-inner h1{font-size:42px;font-weight:200;margin-bottom:8px;letter-spacing:-1px}
.welcome-inner p{font-size:14px;color:var(--t3);margin-bottom:28px}
.welcome-inner button{padding:12px 28px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--t1);font-size:14px;cursor:pointer;transition:all .2s}
.welcome-inner button:hover{background:var(--blue);border-color:var(--blue)}

.commit{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;cursor:pointer;transition:background .12s;border:1px solid transparent;margin-bottom:2px}
.commit:hover{background:var(--bg2);border-color:var(--border)}
.commit .hash{font-family:'Cascadia Code','Consolas',monospace;color:var(--purple);font-size:12px;font-weight:600;min-width:65px}
.commit .msg{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.commit .refs{display:flex;gap:3px;flex-shrink:0}
.commit .ref{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;background:rgba(88,166,255,.12);color:var(--blue)}
.commit .ref.tag{background:rgba(210,153,34,.12);color:var(--orange)}
.commit .ref.remote{background:rgba(188,140,255,.12);color:var(--purple)}
.commit .author{font-size:12px;color:var(--t3);min-width:110px;text-align:right}
.commit .date{font-size:12px;color:var(--t4);min-width:90px;text-align:right}
.push-badge{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;flex-shrink:0;letter-spacing:.3px}
.push-badge.pushed{background:rgba(63,185,80,.14);color:var(--green)}
.push-badge.local{background:rgba(248,81,73,.14);color:var(--red)}
.empty-msg{text-align:center;padding:40px;color:var(--t4);font-size:13px}

/* === WORKSPACE === */
.ws-panel{display:none;height:100%;overflow:hidden;padding:0}
.ws-panel.active{display:flex}
.ws-split{display:flex;flex:1;overflow:hidden;position:relative}
.ws-sidebar{width:280px;min-width:160px;max-width:600px;background:var(--bg1);border-right:none;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.ws-resizer-v{width:5px;cursor:col-resize;background:var(--border);flex-shrink:0;transition:background .15s;z-index:2}
.ws-resizer-v:hover,.ws-resizer-v.active{background:var(--blue)}
.ws-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:200px}
.ws-editors{flex:1;display:flex;overflow:hidden;min-height:80px}
.ws-editors.horizontal{flex-direction:row}
.ws-editors.vertical{flex-direction:column}
.ws-group{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:120px;min-height:80px;position:relative;background:var(--bg1)}
.ws-group.focused .ws-editor-tabs{border-bottom-color:var(--border)}
.ws-group-resizer{background:var(--border);flex-shrink:0;transition:background .15s}
.ws-editors.horizontal .ws-group-resizer{width:4px;cursor:col-resize}
.ws-editors.vertical .ws-group-resizer{height:4px;cursor:row-resize}
.ws-group-resizer:hover,.ws-group-resizer.active{background:var(--blue)}
.ws-editor-tab[draggable="true"]{cursor:grab}
.ws-editor-tab.dragging{opacity:.3}
.ws-drop-zone{position:absolute;z-index:20;pointer-events:none;transition:background .12s}
.ws-group.drag-over .ws-drop-zone{pointer-events:auto}
.ws-drop-zone.top{top:0;left:0;right:0;height:35%}
.ws-drop-zone.bottom{bottom:0;left:0;right:0;height:35%}
.ws-drop-zone.left{top:0;left:0;bottom:0;width:35%}
.ws-drop-zone.right{top:0;right:0;bottom:0;width:35%}
.ws-drop-zone.center{top:35%;left:35%;right:35%;bottom:35%}
.ws-drop-zone.highlight{background:rgba(88,166,255,.18);outline:2px dashed var(--blue)}
.ws-editor-tab.tab-drop-left{border-left:2px solid var(--blue)!important}
.ws-editor-tab.tab-drop-right{border-right:2px solid var(--blue)!important}
.ws-md-split{display:flex;flex:1;overflow:hidden}
.ws-md-split-preview{flex:1;overflow:auto}
.ws-sidebar-head{padding:8px 12px;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ws-sidebar-head span{color:var(--t2)}
.ws-tree{flex:1;overflow-y:auto;padding:4px 0}
.ws-editor-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.ws-editor-tab{padding:7px 14px;font-size:11px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;border-right:1px solid var(--border);white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .12s;font-family:'Cascadia Code','Consolas',monospace}
.ws-editor-tab:hover{background:var(--bg3);color:var(--t1)}
.ws-editor-tab.active{background:var(--bg1);color:var(--t1);border-bottom-color:var(--blue)}
.ws-editor-tab .tab-status{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ws-editor-tab .tab-close{font-size:14px;color:var(--t4);margin-left:4px;cursor:pointer;padding:2px 4px;border-radius:3px;line-height:1;min-width:18px;text-align:center}
.ws-editor-tab .tab-close:hover{color:var(--red);background:rgba(248,81,73,.15)}
.ws-editor-tab.tab-selected{background:rgba(88,166,255,.12);outline:1px solid rgba(88,166,255,.4);outline-offset:-1px}
.ws-code-wrap{flex:1;overflow:auto;background:var(--bg1);position:relative;display:flex;flex-direction:column}
.ws-editor{flex:1;width:100%;background:none;color:var(--t1);border:none;outline:none;resize:none;font-family:'Cascadia Code','Consolas','Fira Code',monospace;font-size:13px;line-height:1.7;padding:0 16px 0 62px;tab-size:4;white-space:pre;overflow:auto}
.ws-editor-gutter{position:absolute;left:0;top:0;bottom:0;width:54px;overflow:hidden;pointer-events:none;background:var(--bg1);z-index:1}
.ws-editor-gutter span{display:block;height:calc(13px * 1.7);line-height:calc(13px * 1.7);text-align:right;padding-right:14px;color:var(--t4);font-size:12px;font-family:'Cascadia Code','Consolas',monospace}
.ws-editor-wrap{position:relative;flex:1;overflow:hidden}
.ws-editor-wrap .ws-editor{position:absolute;top:0;left:0;right:0;bottom:0;width:100%;height:100%;padding:0 16px 0 62px}
.ws-code{font-family:'Cascadia Code','Consolas','Fira Code',monospace;font-size:13px;line-height:1.7;min-height:100%;user-select:text}
.ws-line{display:block;position:relative;padding:0 16px 0 62px;min-height:23px;white-space:pre;user-select:text}
.ws-line:hover{background:rgba(255,255,255,.015)}
.ws-lnum{position:absolute;left:0;width:54px;text-align:right;padding-right:14px;color:var(--t4);user-select:none;font-size:12px}
.ws-line.git-add{background:rgba(46,160, 67, .10)}
.ws-line.git-add .ws-lnum{color:var(--green)}
.ws-line.git-mod{background:rgba(210, 153, 34, .08)}
.ws-line.git-mod .ws-lnum{color:var(--orange)}
.ws-line.git-del{background:rgba(248, 81, 73, .10);text-decoration:line-through;color:var(--t3)}
.ws-line.git-del .ws-lnum{color:var(--red)}
.ws-line .ws-gutter{position:absolute;left:54px;top:0;bottom:0;width:8px}
.ws-line.git-add .ws-gutter{background:var(--green)}
.ws-line.git-mod .ws-gutter{background:var(--orange)}
.ws-line.git-del .ws-gutter{background:var(--red)}
.ws-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--t4);font-size:13px;text-align:center;padding:40px}
.ws-empty-icon{font-size:48px;opacity:.3;margin-bottom:12px}
.ws-diff-toggle{padding:4px 12px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.ws-diff-toggle button{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--t2);font-size:10px;cursor:pointer;transition:all .12s}
.ws-diff-toggle button:hover{background:var(--bg4);color:var(--t1)}
.ws-diff-toggle button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.ws-diff-toggle .ws-file-label{font-family:'Cascadia Code','Consolas',monospace;font-size:11px;color:var(--t2);margin-left:auto}
.ws-md-preview{padding:24px 32px;color:var(--t1);font-size:14px;line-height:1.75;max-width:800px;user-select:text}
.ws-md-preview h1{font-size:28px;font-weight:700;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);color:var(--t1)}
.ws-md-preview h2{font-size:22px;font-weight:600;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);color:var(--t1)}
.ws-md-preview h3{font-size:18px;font-weight:600;margin:16px 0 8px;color:var(--t1)}
.ws-md-preview h4{font-size:15px;font-weight:600;margin:12px 0 6px;color:var(--t2)}
.ws-md-preview p{margin:8px 0}
.ws-md-preview a{color:var(--blue);text-decoration:none}
.ws-md-preview a:hover{text-decoration:underline}
.ws-md-preview code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-family:'Cascadia Code','Consolas',monospace;font-size:12px;color:var(--orange)}
.ws-md-preview pre{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:14px 18px;overflow-x:auto;margin:12px 0}
.ws-md-preview pre code{background:none;padding:0;font-size:12px;color:var(--t1)}
.ws-md-preview blockquote{border-left:4px solid var(--blue);padding:4px 16px;margin:12px 0;color:var(--t3);background:rgba(88,166,255,.04);border-radius:0 6px 6px 0}
.ws-md-preview ul,.ws-md-preview ol{margin:8px 0;padding-left:24px}
.ws-md-preview li{margin:4px 0}
.ws-md-preview hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.ws-md-preview img{max-width:100%;border-radius:6px;margin:8px 0}
.ws-md-preview table{border-collapse:collapse;margin:12px 0;width:100%}
.ws-md-preview th,.ws-md-preview td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.ws-md-preview th{background:var(--bg3);font-weight:600}
.ws-md-preview input[type="checkbox"]{margin-right:6px}

.ws-live-strip{height:120px;min-height:60px;max-height:500px;background:var(--bg2);border-top:none;overflow-y:auto;flex-shrink:0;padding:6px 10px;display:flex;flex-direction:column-reverse;gap:3px}
.ws-bottom-panel{min-height:80px;max-height:500px;height:180px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
.ws-bottom-tabs{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 8px}
.ws-bottom-tabs button{padding:5px 12px;background:none;border:none;color:var(--t3);font-size:11px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}
.ws-bottom-tabs button:hover{color:var(--t1)}
.ws-bottom-tabs button.active{color:var(--t1);border-bottom-color:var(--blue)}
.ws-bottom-tabs .bt-count{font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(88,166,255,.15);color:var(--blue);margin-left:4px;font-weight:600}
.ws-bottom-content{flex:1;overflow-y:auto}
.ws-changes-list{padding:0}
.ws-change-row{display:flex;align-items:center;gap:8px;padding:4px 12px;font-size:11px;cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.ws-change-row:hover{background:var(--bg3)}
.ws-change-row .cr-badge{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700;min-width:16px;text-align:center;flex-shrink:0}
.ws-change-row .cr-badge.st-M{background:rgba(210,153,34,.18);color:var(--orange)}
.ws-change-row .cr-badge.st-A{background:rgba(63,185,80,.18);color:var(--green)}
.ws-change-row .cr-badge.st-D{background:rgba(248,81,73,.18);color:var(--red)}
.ws-change-row .cr-badge.st-S{background:rgba(88,166,255,.18);color:var(--blue)}
.ws-change-row .cr-badge.st-C{background:rgba(248,81,73,.25);color:var(--red)}
.ws-change-row .cr-badge.st-R{background:rgba(188,140,255,.18);color:var(--purple)}
.ws-change-row .cr-file{font-family:'Cascadia Code','Consolas',monospace;font-size:11px;color:var(--t1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ws-change-row .cr-stats{display:flex;gap:6px;font-size:10px;font-weight:600;flex-shrink:0}
.ws-change-row .cr-stats .cs-a{color:var(--green)}.ws-change-row .cr-stats .cs-d{color:var(--red)}
.ws-change-row .cr-author{font-size:10px;color:var(--t3);min-width:80px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.ws-change-row .cr-date{font-size:10px;color:var(--t4);min-width:55px;text-align:right;flex-shrink:0}
.ws-change-row .cr-msg{font-size:10px;color:var(--t4);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.ws-resizer-h{height:5px;cursor:row-resize;background:var(--border);flex-shrink:0;transition:background .15s}
.ws-resizer-h:hover,.ws-resizer-h.active{background:var(--blue)}

.wt-item{display:flex;align-items:center;gap:6px;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:12px;transition:background .1s;white-space:nowrap;overflow:hidden}
.wt-item:hover{background:var(--bg3)}
.wt-item.selected{background:var(--bg4)}
.wt-item .wt-icon{font-size:12px;flex-shrink:0;width:16px;text-align:center}
.wt-item .wt-name{overflow:hidden;text-overflow:ellipsis;font-size:12px}
.wt-item .wt-status{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:auto}
.wt-item .wt-status.st-M{background:var(--orange)}.wt-item .wt-status.st-A{background:var(--green)}
.wt-item .wt-status.st-D{background:var(--red)}.wt-item .wt-status.st-S{background:var(--blue)}
.wt-item .wt-status.st-C{background:var(--red);animation:pulse 1s infinite}.wt-item .wt-status.st-R{background:var(--purple)}
.wt-dir{font-weight:600;color:var(--t2)}
.wt-dir .wt-chevron{font-size:9px;transition:transform .15s;display:inline-block;width:12px}
.wt-dir .wt-chevron.collapsed{transform:rotate(-90deg)}
.wt-dir-children{overflow:hidden}
.wt-dir-children.collapsed{display:none}
.wt-depth{display:flex;flex-direction:column}

.ws-live-event{display:flex;align-items:center;gap:6px;font-size:10px;padding:2px 6px;border-radius:3px;flex-shrink:0}
.ws-live-event .le-icon{font-weight:700;font-size:11px}
.ws-live-event .le-icon.add{color:var(--green)}.ws-live-event .le-icon.change{color:var(--orange)}.ws-live-event .le-icon.unlink{color:var(--red)}
.ws-live-event .le-file{font-family:'Cascadia Code','Consolas',monospace;font-size:10px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.ws-live-event .le-file:hover{color:var(--t1);text-decoration:underline}
.ws-live-event .le-time{color:var(--t4);font-size:9px;flex-shrink:0}

.kw{color:#ff7b72}.str{color:#a5d6ff}.num{color:#79c0ff}.cm{color:#6e7681;font-style:italic}.fn{color:#d2a8ff}.typ{color:#ffa657}.op{color:#79c0ff}.dec{color:#ffa657}

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:var(--bg2);border-radius:10px;width:92%;max-width:1050px;max-height:82vh;display:flex;flex-direction:column;border:1px solid var(--border);box-shadow:0 16px 48px rgba(0,0,0,.5)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-head h3{font-size:13px;font-weight:600}
.modal-close{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:all .15s}
.modal-close:hover{background:var(--bg4);color:var(--t1)}
.modal-body{overflow-y:auto;flex:1;font-family:'Cascadia Code','Consolas',monospace;font-size:12px}
.dfile{padding:8px 14px;background:var(--bg3);color:var(--t1);font-weight:600;position:sticky;top:0;z-index:1;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;font-size:12px}
.dfile .stats{font-weight:400;font-size:11px;display:flex;gap:10px}
.dstats-a{color:var(--green)}.dstats-d{color:var(--red)}
.dline{display:flex;min-height:20px;padding:0 14px;line-height:1.6}
.dline .ln{width:48px;text-align:right;color:var(--t4);padding-right:10px;user-select:none;flex-shrink:0;font-size:11px}
.dline .lc{flex:1;white-space:pre;overflow-x:auto}

.toast-container{position:fixed;top:48px;right:16px;z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}

@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}

.author-bar{height:8px;border-radius:4px;transition:width .5s ease}

.push-bar{display:flex;height:28px;border-radius:6px;overflow:hidden;margin-bottom:8px;background:var(--bg3)}
.push-bar .seg-pushed{background:var(--green)}.push-bar .seg-local{background:var(--red)}
.push-legend{display:flex;gap:16px;font-size:11px;color:var(--t2)}.push-legend span{display:flex;align-items:center;gap:5px}
.push-legend .dot-g,.push-legend .dot-r{width:8px;height:8px;border-radius:50%}.push-legend .dot-g{background:var(--green)}.push-legend .dot-r{background:var(--red)}
.shortcut-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.shortcut-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg2);border-radius:5px;font-size:12px}

.shortcut-desc{color:var(--t2)}
.status-section{margin-bottom:16px}

.sbadge.D{background:rgba(248,81,73,.18);color:var(--red)}.sbadge.R{background:rgba(188,140,255,.18);color:var(--purple)}.sbadge.S{background:rgba(88,166,255,.18);color:var(--blue)}

/* === LIVE TAB === */
.live-event{background:var(--bg2);border-radius:7px;margin-bottom:6px;border-left:3px solid var(--blue);animation:slideIn .25s ease;overflow:hidden}
.live-event.evt-add{border-left-color:var(--green)}.live-event.evt-change{border-left-color:var(--orange)}.live-event.evt-unlink{border-left-color:var(--red)}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.live-event-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .12s;user-select:none}
.live-event-header:hover{background:rgba(255,255,255,.03)}

.cmp-line .ctext{flex:1;white-space:pre;padding:0 8px}
.cmp-line.ctx{color:var(--t2)}
.cmp-line.add{background:rgba(46,160,67,.12)}.cmp-line.add .ctext{color:var(--t1)}
.cmp-line.del{background:rgba(248,81,73,.08)}.cmp-line.del .ctext{color:var(--t2)}

::-webkit-scrollbar{width:7px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

</style>
</head>
<body>

<div class="titlebar">
  <div class="titlebar-dots">
    <div class="titlebar-dot dot-close" onclick="livegit.close()">&#10005;</div>
    <div class="titlebar-dot dot-min" onclick="livegit.minimize()">&#8211;</div>
    <div class="titlebar-dot dot-max" onclick="livegit.maximize()">&#9723;</div>
  </div>
  <div class="titlebar-title">LiveGit <span style="font-size:10px;color:var(--t4);font-weight:400">v1.2.0</span></div>
  <div class="titlebar-path" id="titlePath"></div>
</div>

<div class="toolbar" id="toolbar">
  <button class="primary" onclick="browseFolder()">&#128193; Offnen</button>
  <button onclick="refreshRepo()">&#8635; Refresh</button>
  <button onclick="toggleCharDiff()" id="charDiffBtn" class="primary" title="Zeichen-Level-Diff umschalten">&#128270; Char-Diff</button>
  <div class="repo-name" id="repoName" style="display:none">
    <span id="repoLabel"></span>
    <span class="branch" id="branchBadge"></span>
  </div>
  <div class="search-box" id="searchBox" style="display:none">
    <input type="text" id="searchInput" placeholder="Commits durchsuchen..." oninput="filterCommits(this.value)"/>
  </div>
</div>

<div class="info-strip" id="infoStrip" style="display:none">
  <div class="info-chip">Commits: <b id="iCommits">0</b></div>
  <div class="info-chip">Geandert: <b id="iModified">0</b></div>
  <div class="info-chip">Staged: <b id="iStaged">0</b></div>
  <div class="info-chip">Ahead: <b id="iAhead">0</b></div>
  <div class="info-chip">Behind: <b id="iBehind">0</b></div>
  <div class="info-chip live"><span class="pulse"></span> LIVE</div>
</div>

<div class="tabs" id="tabBar" style="display:none">
  <button class="tab active" data-tab="workspace" onclick="switchTab('workspace')">&#128187; Workspace</button>
  <button class="tab" data-tab="commits" onclick="switchTab('commits')">&#128203; Commits</button>
  <button class="tab" data-tab="compare" onclick="switchTab('compare')">&#128200; Vergleichen</button>
  <button class="tab" data-tab="push" onclick="switchTab('push')">&#128228; Push</button>
  <button class="tab" data-tab="status" onclick="switchTab('status')">&#9888; Status</button>
  <button class="tab" data-tab="live" onclick="switchTab('live')">&#128308; Live</button>
  <button class="tab" data-tab="insights" onclick="switchTab('insights')">&#128161; Insights</button>
</div>

<div class="main">
  <div class="panel active" id="p-welcome">
    <div class="welcome"><div class="welcome-inner">
      <h1>LiveGit</h1>
      <p>Git-Projekte in Echtzeit beobachten</p>
      <button onclick="browseFolder()">&#128193; Git-Repository offnen</button>
    </div></div>
  </div>

  <!-- WORKSPACE (split view) -->
  <div class="ws-panel" id="p-workspace">
    <div class="ws-split">
      <div class="ws-sidebar">
        <div class="ws-sidebar-head"><span>Dateien</span><span id="wsFileCount"></span></div>
        <div class="ws-tree" id="wsTree"></div>
      </div>
      <div class="ws-resizer-v" id="resizerV"></div>
      <div class="ws-right">
        <div class="ws-editors horizontal" id="wsEditors"></div>
        <div class="ws-resizer-h" id="resizerH"></div>
        <div class="ws-bottom-panel" id="wsBottomPanel">
          <div class="ws-bottom-tabs">
            <button class="active" onclick="wsBottomTab('changes',this)">Anderungen<span class="bt-count" id="wsChangesCount">0</span></button>
            <button onclick="wsBottomTab('live',this)">Live</button>
          </div>
          <div class="ws-bottom-content" id="wsBottomContent">
            <div class="ws-changes-list" id="wsChangesList"></div>
            <div class="ws-live-strip" id="wsLiveStrip" style="display:none"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel" id="p-commits"></div>

  <!-- COMPARE (side-by-side diff) -->
  <div class="panel" id="p-compare" style="display:none;flex-direction:column;padding:0">
    <div class="cmp-header" style="padding:10px 16px">
      <div class="cmp-selectors">
        <select id="cmpFrom" onchange="runCompare()"></select>
        <div class="cmp-arrow">&#8594;</div>
        <select id="cmpTo" onchange="runCompare()"></select>
      </div>
      <div class="cmp-stats" id="cmpStats"></div>
    </div>
    <div class="cmp-layout" id="cmpLayout">
      <div class="cmp-file-list" id="cmpFileList">
        <div class="cmp-fl-head">Geanderte Dateien</div>
      </div>
      <div class="cmp-diff-area" id="cmpDiffWrap">
        <div class="cmp-empty-msg">Zwei Commits zum Vergleichen auswaehlen</div>
      </div>
    </div>
  </div>

  <div class="panel" id="p-push"></div>
  <div class="panel" id="p-status"></div>

  <!-- LIVE (collapsible events with inline diffs) -->
  <div class="panel" id="p-live">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="font-size:14px;font-weight:600">Echtzeit-Anderungen</h3>
      <div style="display:flex;align-items:center;gap:6px;color:var(--green);font-size:12px;font-weight:700"><span class="pulse"></span> Live</div>
    </div>
    <div id="liveFeed"><div class="empty-msg">Warte auf Dateianderungen... Jede Aenderung wird hier live angezeigt.</div></div>
  </div>

  <div class="panel" id="p-insights"></div>
</div>

<div class="modal-bg" id="diffModal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div class="modal-head"><h3 id="diffTitle">Diff</h3><button class="modal-close" onclick="closeModal()">&#10005;</button></div>
  <div class="modal-body" id="diffBody"></div></div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const LG = window.livegit;
let repo = '';
let commits = [];
let hotFilesMap = {};
let curTab = 'welcome';
let wsGroups = [{ id: 0, tabs: [], active: null, viewMode: 'content' }];
let wsActiveGroupId = 0;
let wsNextGroupId = 1;
let wsSplitDir = 'horizontal';
let wsActiveFile = null;
let wsViewModeCurrent = 'content';
let wsOpenTabs = [];
let wsDragInfo = null;
let wsSelectedTabs = new Set();
let wsLastSelectedTab = null;

function wsGetGroup(id) { return wsGroups.find(g => g.id === id); }
function wsActiveGroup() { return wsGetGroup(wsActiveGroupId); }
function wsFindFileGroup(fp) { return wsGroups.find(g => g.tabs.includes(fp)); }
function wsSyncVars() {
  const g = wsActiveGroup();
  wsActiveFile = g ? g.active : null;
  wsViewModeCurrent = g ? g.viewMode : 'content';
  wsOpenTabs = g ? g.tabs.slice() : [];
}
let wsLiveEvents = [];
let charDiffEnabled = true;
let simpleDiffEnabled = false;

function toggleCharDiff() {
  charDiffEnabled = !charDiffEnabled;
  const btn = document.getElementById('charDiffBtn');
  if (btn) btn.classList.toggle('primary', charDiffEnabled);
  wsGroups.forEach(g => { if (g.active) wsLoadContent(g.id); });
}

async function diffContextMenu(e, gid) {
  e.preventDefault(); e.stopPropagation();
  const action = await LG.contextMenu([
    {id:'char-on', label: (charDiffEnabled ? '● ' : '') + 'Zeichen-Diff'},
    {id:'char-off', label: (!charDiffEnabled ? '● ' : '') + 'Zeilen-Diff'},
    {id:'sep1', label: '───'},
    {id:'simple-on', label: (simpleDiffEnabled ? '● ' : '') + 'Vereinfachte Darstellung'},
    {id:'simple-off', label: (!simpleDiffEnabled ? '● ' : '') + 'Normale Darstellung'}
  ]);
  if (!action) return;
  if (action === 'char-on') charDiffEnabled = true;
  else if (action === 'char-off') charDiffEnabled = false;
  else if (action === 'simple-on') simpleDiffEnabled = true;
  else if (action === 'simple-off') simpleDiffEnabled = false;
  const btn = document.getElementById('charDiffBtn');
  if (btn) btn.classList.toggle('primary', charDiffEnabled);
  wsGroups.forEach(g => { if (g.active) wsLoadContent(g.id); });
}

function charDiff(a, b) {
  if (!charDiffEnabled) return null;
  const m = a.length, n = b.length;
  if (m > 800 || n > 800 || m === 0 || n === 0) return null;
  const dp = new Array(m + 1);
  for (let i = 0; i <= m; i++) { dp[i] = new Uint16Array(n + 1); }
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (a[i-1] === b[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
      else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }
  const parts = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
      parts.push({ text: a[i-1], type: 'same' }); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      parts.push({ text: b[j-1], type: 'add' }); j--;
    } else {
      parts.push({ text: a[i-1], type: 'del' }); i--;
    }
  }
  parts.reverse();
  const merged = [];
  for (const p of parts) {
    if (merged.length && merged[merged.length-1].type === p.type) merged[merged.length-1].text += p.text;
    else merged.push({ text: p.text, type: p.type });
  }
  return merged;
}

function renderCharDiffDel(parts) {
  return parts.map(p => {
    if (p.type === 'same') return esc(p.text);
    if (p.type === 'del') return '<span class="ch-del">' + esc(p.text) + '</span>';
    return '';
  }).join('');
}

function renderCharDiffAdd(parts) {
  return parts.map(p => {
    if (p.type === 'same') return esc(p.text);
    if (p.type === 'add') return '<span class="ch-add">' + esc(p.text) + '</span>';
    return '';
  }).join('');
}

function switchTab(t) {
  curTab = t;
  document.querySelectorAll('.tab').forEach(e => e.classList.toggle('active', e.dataset.tab === t));
  document.querySelectorAll('.panel, .ws-panel').forEach(e => {
    e.classList.remove('active');
    if (e.id === 'p-compare') e.style.display = 'none';
  });
  const p = document.getElementById('p-' + t);
  if (p) {
    p.classList.add('active');
    if (t === 'compare') p.style.display = 'flex';
  }
}

async function browseFolder() { const p = await LG.openFolder(); if (p) await loadRepo(p); }
async function loadRepo(p) { repo = p; const d = await LG.openRepo(p); if (d.error) { alert(d.error); return; } renderRepo(d); }
async function refreshRepo() { if (!repo) return; const d = await LG.openRepo(repo); if (!d.error) renderRepo(d); }

function renderRepo(d) {
  document.getElementById('p-welcome').classList.remove('active');
  document.getElementById('titlePath').textContent = d.path;
  document.getElementById('repoName').style.display = 'flex';
  document.getElementById('searchBox').style.display = 'flex';
  document.getElementById('repoLabel').textContent = d.path.replace(/\\/g,'/').split('/').pop();
  document.getElementById('branchBadge').textContent = d.currentBranch;
  document.getElementById('infoStrip').style.display = 'flex';
  document.getElementById('tabBar').style.display = 'flex';
  document.getElementById('iCommits').textContent = d.log.length;
  document.getElementById('iModified').textContent = d.status.modified.length + d.status.conflicted.length;
  document.getElementById('iStaged').textContent = d.status.staged.length + d.status.created.length;
  document.getElementById('iAhead').textContent = d.status.ahead;
  document.getElementById('iBehind').textContent = d.status.behind;
  commits = d.log;
  renderCommits(d.log);
  populateCompareSelects();
  renderPushOverview(d.log, d.status);
  renderStatus(d.status);
  loadWorkspace();
  loadInsights();
  document.getElementById('liveFeed').innerHTML = '<div class="empty-msg">Warte auf Dateianderungen...</div>';
  if (curTab === 'welcome') switchTab('workspace');
}

// =================== WORKSPACE ===================
let wsBottomActiveTab = 'changes';

function wsBottomTab(tab, btn) {
  wsBottomActiveTab = tab;
  document.querySelectorAll('.ws-bottom-tabs button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const cl = document.getElementById('wsChangesList');
  const ls = document.getElementById('wsLiveStrip');
  if (tab === 'changes') { cl.style.display = ''; ls.style.display = 'none'; }
  else { cl.style.display = 'none'; ls.style.display = ''; }
}

async function loadChangesOverview() {
  try {
    const data = await LG.changesOverview(repo);
    const el = document.getElementById('wsChangesList');
    const cnt = document.getElementById('wsChangesCount');
    if (!el) return;
    if (!data || data.error || !data.files || !data.files.length) {
      if (cnt) cnt.textContent = '0';
      el.innerHTML = '<div style="padding:16px;text-align:center;color:var(--t4);font-size:12px">Arbeitsverzeichnis sauber</div>';
      return;
    }
    if (cnt) cnt.textContent = data.files.length;
    el.innerHTML = data.files.map(f => {
      return `<div class="ws-change-row" onclick="wsOpenFile('${esc(f.file)}');switchTab('workspace')" oncontextmenu="fileContextMenu(event,'${esc(f.file)}')">
      <span class="cr-badge st-${f.status}">${f.status}</span>
      <span class="cr-file">${esc(f.file)}</span>
      <span class="cr-stats">${f.adds ? '<span class="cs-a">+' + f.adds + '</span>' : ''}${f.dels ? '<span class="cs-d">-' + f.dels + '</span>' : ''}</span>
      <span class="cr-author">${esc(f.author)}</span>
      <span class="cr-msg">${esc(f.message)}</span>
      <span class="cr-date">${fmtDate(f.date)}</span>
    </div>`;
    }).join('');
  } catch (err) {
    const el = document.getElementById('wsChangesList');
    if (el) el.innerHTML = '<div style="padding:16px;text-align:center;color:var(--red);font-size:12px">Fehler: ' + esc(err.message || 'unbekannt') + '</div>';
  }
}

async function loadWorkspace() {
  const [treeData, hotData] = await Promise.all([LG.dirTree(repo), LG.hotFiles(repo)]);
  hotFilesMap = {};
  (hotData.files||[]).forEach(f => hotFilesMap[f.file] = f.changes);
  renderWsTree(treeData.tree || []);
  document.getElementById('wsLiveStrip').innerHTML = '';
  wsLiveEvents = [];
  loadChangesOverview();
  wsBottomTab('changes', document.querySelector('.ws-bottom-tabs button.active'));
}

function renderWsTree(tree) {
  const el = document.getElementById('wsTree');
  const fileCount = countFiles(tree);
  document.getElementById('wsFileCount').textContent = fileCount + ' Dateien';
  el.innerHTML = tree.map(n => renderWsNode(n, 0)).join('');
}

function countFiles(nodes) {
  let c = 0;
  for (const n of nodes) { if (n.type === 'file') c++; else c += countFiles(n.children || []); }
  return c;
}

function renderWsNode(node, depth) {
  const pad = depth * 16;
  if (node.type === 'dir') {
    const id = 'wsdir-' + node.path.replace(/[^a-zA-Z0-9]/g, '_');
    const hasSt = node.hasStatus;
    return `<div class="wt-item wt-dir" style="padding-left:${pad+8}px" onclick="toggleWsDir('${id}',this)">
      <span class="wt-chevron">&#9660;</span>
      <span class="wt-icon">&#128193;</span>
      <span class="wt-name">${esc(node.name)}</span>
      ${hasSt ? '<span class="wt-status" style="background:var(--orange);width:6px;height:6px;border-radius:50%;margin-left:auto"></span>' : ''}
    </div>
    <div class="wt-dir-children" id="${id}">
      ${(node.children||[]).map(c => renderWsNode(c, depth+1)).join('')}
    </div>`;
  }
  const stDot = node.status ? `<span class="wt-status st-${node.status}"></span>` : '';
  return `<div class="wt-item" style="padding-left:${pad+24}px" onclick="wsOpenFile('${esc(node.path)}')" oncontextmenu="fileContextMenu(event,'${esc(node.path)}')" data-path="${esc(node.path)}">
    <span class="wt-icon">${fileIcon(node.name)}</span>
    <span class="wt-name">${esc(node.name)}</span>
    ${stDot}
  </div>`;
}

function toggleWsDir(id, el) {
  const d = document.getElementById(id);
  const ch = el.querySelector('.wt-chevron');
  if (d.classList.contains('collapsed')) { d.classList.remove('collapsed'); ch.classList.remove('collapsed'); }
  else { d.classList.add('collapsed'); ch.classList.add('collapsed'); }
}

async function wsOpenFile(fp) {
  let g = wsFindFileGroup(fp);
  if (!g) {
    g = wsActiveGroup();
    g.tabs.push(fp);
  }
  g.active = fp;
  wsActiveGroupId = g.id;
  wsSyncVars();
  renderEditorLayout();
  document.querySelectorAll('.wt-item').forEach(el => el.classList.toggle('selected', el.dataset.path === fp));
}

function renderEditorLayout() {
  const el = document.getElementById('wsEditors');
  if (!el) return;
  el.className = 'ws-editors ' + wsSplitDir;
  let html = '';
  wsGroups.forEach((g, i) => {
    if (i > 0) html += `<div class="ws-group-resizer" data-group-resizer="${g.id}"></div>`;
    const isMd = g.active && g.active.toLowerCase().endsWith('.md');
    const vm = g.viewMode;
    html += `<div class="ws-group${g.id === wsActiveGroupId ? ' focused' : ''}" data-group="${g.id}" onmousedown="wsFocusGroup(${g.id})">`;
    html += `<div class="ws-editor-tabs" id="wsTabs-${g.id}">${renderGroupTabsHTML(g)}</div>`;
    html += `<div class="ws-diff-toggle" id="wsToolbar-${g.id}" style="display:${g.active ? 'flex' : 'none'}">`;
    html += `<button class="${vm==='content'?'active':''}" onclick="wsSetViewMode(${g.id},'content')">Inhalt</button>`;
    html += `<button class="${vm==='diff'?'active':''}" onclick="wsSetViewMode(${g.id},'diff')" oncontextmenu="event.preventDefault();diffContextMenu(event,${g.id})">Diff</button>`;
    if (isMd) {
      html += `<button class="${vm==='md'?'active':''}" onclick="wsSetViewMode(${g.id},'md')">Vorschau</button>`;
      html += `<button class="${vm==='md-split'?'active':''}" onclick="wsSetViewMode(${g.id},'md-split')">Split</button>`;
    }
    html += `<span class="ws-file-label" id="wsLabel-${g.id}">${esc(g.active || '')}</span>`;
    html += `</div>`;
    html += `<div class="ws-code-wrap" id="wsCode-${g.id}"></div>`;
    html += `<div class="ws-drop-zone top" data-drop="top"></div>`;
    html += `<div class="ws-drop-zone bottom" data-drop="bottom"></div>`;
    html += `<div class="ws-drop-zone left" data-drop="left"></div>`;
    html += `<div class="ws-drop-zone right" data-drop="right"></div>`;
    html += `<div class="ws-drop-zone center" data-drop="center"></div>`;
    html += `</div>`;
  });
  el.innerHTML = html;
  wsGroups.forEach(g => { if (g.active) wsLoadContent(g.id); });
  initGroupResizers();
}

function renderGroupTabsHTML(g) {
  return g.tabs.map((fp, i) => {
    const name = fp.split('/').pop();
    const active = fp === g.active;
    const sel = wsSelectedTabs.has(g.id + ':' + fp) ? ' tab-selected' : '';
    return `<div class="ws-editor-tab${active ? ' active' : ''}${sel}" draggable="true" data-group="${g.id}" data-file="${esc(fp)}" data-idx="${i}"
      ondragstart="wsTabDragStart(event,${g.id},'${esc(fp)}')"
      ondragend="wsTabDragEnd(event)"
      onclick="wsTabClick(event,${g.id},'${esc(fp)}',${i})">
      <span class="tab-status" style="background:var(--t4)"></span>
      ${esc(name)}
      <span class="tab-close" onclick="event.stopPropagation();wsCloseTabs(${g.id},'${esc(fp)}')">&times;</span>
    </div>`;
  }).join('');
}

function wsTabClick(e, gid, fp, idx) {
  const g = wsGetGroup(gid);
  if (!g) return;
  if (e.shiftKey && wsLastSelectedTab && wsLastSelectedTab.gid === gid) {
    const lastIdx = g.tabs.indexOf(wsLastSelectedTab.fp);
    if (lastIdx >= 0) {
      const from = Math.min(lastIdx, idx);
      const to = Math.max(lastIdx, idx);
      for (let i = from; i <= to; i++) wsSelectedTabs.add(gid + ':' + g.tabs[i]);
    }
    renderEditorLayout();
    return;
  }
  wsSelectedTabs.clear();
  wsLastSelectedTab = { gid, fp };
  wsActivateTab(gid, fp);
}

function wsCloseTabs(gid, fp) {
  const g = wsGetGroup(gid);
  if (!g) return;
  if (wsSelectedTabs.size > 0) {
    const toClose = [];
    wsSelectedTabs.forEach(key => {
      const [gIdStr, ...rest] = key.split(':');
      if (parseInt(gIdStr) === gid) toClose.push(rest.join(':'));
    });
    if (toClose.length > 0) {
      toClose.forEach(f => wsCloseTab(gid, f));
      wsSelectedTabs.clear();
      return;
    }
  }
  wsCloseTab(gid, fp);
}

function renderWsTabs() { renderEditorLayout(); }

function wsFocusGroup(gid) {
  wsActiveGroupId = gid;
  wsSyncVars();
  document.querySelectorAll('.ws-group').forEach(el => el.classList.toggle('focused', parseInt(el.dataset.group) === gid));
}

async function wsActivateTab(gid, fp) {
  const g = wsGetGroup(gid);
  if (!g) return;
  g.active = fp;
  wsActiveGroupId = gid;
  wsSyncVars();
  renderEditorLayout();
  document.querySelectorAll('.wt-item').forEach(el => el.classList.toggle('selected', el.dataset.path === fp));
}

function wsCloseTab(gid, fp) {
  const g = wsGetGroup(gid);
  if (!g) return;
  g.tabs = g.tabs.filter(t => t !== fp);
  if (g.active === fp) {
    g.active = g.tabs.length ? g.tabs[g.tabs.length - 1] : null;
    if (!g.active) g.viewMode = 'content';
  }
  if (g.tabs.length === 0 && wsGroups.length > 1) {
    wsGroups = wsGroups.filter(gr => gr.id !== gid);
    if (wsActiveGroupId === gid) wsActiveGroupId = wsGroups[0].id;
  }
  wsSyncVars();
  renderEditorLayout();
}

async function wsLoadContent(gid) {
  const g = wsGetGroup(gid);
  if (!g || !g.active) return;
  const fp = g.active;
  const isMd = fp.toLowerCase().endsWith('.md');
  if (g.viewMode === 'md-split' && isMd) wsShowMdSplit(gid, fp);
  else if (g.viewMode === 'md' && isMd) wsShowMarkdown(gid, fp);
  else if (g.viewMode === 'diff') wsShowDiff(gid, fp);
  else wsShowContent(gid, fp);
}

async function wsLoadContentSilent(gid) {
  const g = wsGetGroup(gid);
  if (!g || !g.active) return;
  const fp = g.active;
  const isMd = fp.toLowerCase().endsWith('.md');
  if (g.viewMode === 'md-split' && isMd) wsShowMdSplit(gid, fp);
  else if (g.viewMode === 'md' && isMd) wsShowMarkdown(gid, fp, true);
  else if (g.viewMode === 'diff') wsShowDiff(gid, fp, true);
  else wsShowContent(gid, fp, true);
}

function wsSetViewMode(gid, mode) {
  const g = wsGetGroup(gid);
  if (!g) return;
  g.viewMode = mode;
  wsSyncVars();
  renderEditorLayout();
}

function wsViewMode(mode) {
  const g = wsActiveGroup();
  if (g) wsSetViewMode(g.id, mode);
}

async function wsShowContent(gid, fp, silent) {
  const wrap = document.getElementById('wsCode-' + gid);
  if (!wrap) return;
  const scrollTop = wrap.scrollTop;
  if (!silent) wrap.innerHTML = '<div class="ws-empty">Lade...</div>';
  const [fileData, diffData] = await Promise.all([
    LG.liveFileContent(repo, fp),
    LG.fileDiff(repo, fp)
  ]);
  if (fileData.deleted) { wrap.innerHTML = '<div class="ws-empty"><div style="color:var(--red)">Datei wurde geloscht</div></div>'; return; }
  if (fileData.tooLarge) { wrap.innerHTML = '<div class="ws-empty">Datei zu gross</div>'; return; }
  if (fileData.isDir) { wrap.innerHTML = '<div class="ws-empty">Verzeichnis</div>'; return; }
  const content = fileData.content || '';
  const lineMap = parseLineChanges(diffData.diff || '');
  const lines = content.split('\n');
  const gutterBg = lines.map((l, i) => {
    const cls = lineMap.get(i + 1) || '';
    const bg = cls === 'git-add' ? 'background:rgba(46,160,67,.10);' : cls === 'git-mod' ? 'background:rgba(210,153,34,.08);' : '';
    return `<span style="${bg}">${i + 1}</span>`;
  }).join('');
  wrap.innerHTML = `<div class="ws-editor-wrap">
    <div class="ws-editor-gutter" id="wsGutter-${gid}">${gutterBg}</div>
    <textarea class="ws-editor" id="wsEditor-${gid}" spellcheck="false"
      oninput="wsEditorInput(${gid})" onscroll="wsEditorScroll(${gid})"
      onkeydown="wsEditorKey(event,${gid})">${esc(content)}</textarea>
  </div>`;
  if (silent) {
    const ta = document.getElementById('wsEditor-' + gid);
    if (ta) ta.scrollTop = scrollTop;
  }
  wsEditorScroll(gid);
}

function wsEditorInput(gid) {
  const ta = document.getElementById('wsEditor-' + gid);
  const gutter = document.getElementById('wsGutter-' + gid);
  if (!ta || !gutter) return;
  const lines = ta.value.split('\n');
  gutter.innerHTML = lines.map((l, i) => `<span>${i + 1}</span>`).join('');
  const g = wsGetGroup(gid);
  if (g) g._dirty = true;
  wsUpdateSaveStatus(gid);
}

function wsEditorScroll(gid) {
  const ta = document.getElementById('wsEditor-' + gid);
  const gutter = document.getElementById('wsGutter-' + gid);
  if (ta && gutter) gutter.scrollTop = ta.scrollTop;
}

function wsEditorKey(e, gid) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    ta.value = ta.value.substring(0, start) + '    ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = start + 4;
    wsEditorInput(gid);
  }
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    wsSaveFile(gid);
  }
}

async function wsSaveFile(gid) {
  const g = wsGetGroup(gid);
  if (!g || !g.active) return;
  const ta = document.getElementById('wsEditor-' + gid);
  if (!ta) return;
  const label = document.getElementById('wsLabel-' + gid);
  if (label) label.textContent = g.active + ' ...';
  const result = await LG.saveFile(repo, g.active, ta.value);
  if (result.ok) {
    g._dirty = false;
    wsUpdateSaveStatus(gid);
    if (label) label.textContent = g.active;
  } else {
    if (label) label.textContent = g.active + ' [Fehler]';
  }
}

function wsUpdateSaveStatus(gid) {
  const g = wsGetGroup(gid);
  if (!g) return;
  const label = document.getElementById('wsLabel-' + gid);
  if (label && g.active) {
    label.textContent = g.active + (g._dirty ? ' \u2022' : '');
  }
}

async function wsShowDiff(gid, fp, silent) {
  const wrap = document.getElementById('wsCode-' + gid);
  if (!wrap) return;
  const scrollTop = wrap.scrollTop;
  if (!silent) wrap.innerHTML = '<div class="ws-empty">Lade Diff...</div>';
  const d = await LG.fileDiff(repo, fp);
  if (!d.diff) { wrap.innerHTML = '<div class="ws-empty" style="color:var(--green)">Keine Aenderungen gegenueber Git</div>'; return; }
  wrap.innerHTML = `<div class="ws-code">${renderInlineDiff(d.diff)}</div>`;
  if (silent) wrap.scrollTop = scrollTop;
}

async function wsShowMarkdown(gid, fp, silent) {
  const wrap = document.getElementById('wsCode-' + gid);
  if (!wrap) return;
  const scrollTop = wrap.scrollTop;
  if (!silent) wrap.innerHTML = '<div class="ws-empty">Lade...</div>';
  const d = await LG.liveFileContent(repo, fp);
  if (d.deleted) { wrap.innerHTML = '<div class="ws-empty"><div style="color:var(--red)">Datei wurde geloscht</div></div>'; return; }
  wrap.innerHTML = `<div class="ws-md-preview">${renderMarkdown(d.content || '')}</div>`;
  if (silent) wrap.scrollTop = scrollTop;

async function wsShowMdSplit(gid, fp) {
  const wrap = document.getElementById('wsCode-' + gid);
  if (!wrap) return;
  wrap.innerHTML = '<div class="ws-empty">Lade...</div>';
  const fileData = await LG.liveFileContent(repo, fp);
  if (fileData.deleted) { wrap.innerHTML = '<div class="ws-empty"><div style="color:var(--red)">Datei wurde geloscht</div></div>'; return; }
  const content = fileData.content || '';
  const lines = content.split('\n');
  const gutterBg = lines.map((l, i) => `<span>${i + 1}</span>`).join('');
  wrap.innerHTML = `<div class="ws-md-split">
    <div class="ws-editor-wrap">
      <div class="ws-editor-gutter" id="wsGutter-${gid}">${gutterBg}</div>

function wsMdSplitPreview(gid) {
  const ta = document.getElementById('wsEditor-' + gid);

// Tab drag-and-drop
function wsTabDragStart(e, gid, fp) {
  wsSelectedTabs.clear();
  wsDragInfo = { groupId: gid, filePath: fp };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', fp);
  requestAnimationFrame(() => {
    e.target.classList.add('dragging');
    document.querySelectorAll('.ws-group').forEach(el => el.classList.add('drag-over'));
  });
}

function wsTabDragEnd(e) {
  wsDragInfo = null;
  e.target.classList.remove('dragging');
  document.querySelectorAll('.ws-group').forEach(el => el.classList.remove('drag-over'));
  document.querySelectorAll('.ws-drop-zone').forEach(el => el.classList.remove('highlight'));
  document.querySelectorAll('.ws-editor-tab').forEach(el => { el.classList.remove('tab-drop-left', 'tab-drop-right'); });
}

function wsSetupDnD() {
  const el = document.getElementById('wsEditors');
  if (!el) return;
  el.addEventListener('dragover', function(e) {
    e.preventDefault();
    if (!wsDragInfo) return;
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.ws-drop-zone').forEach(z => z.classList.remove('highlight'));
    document.querySelectorAll('.ws-editor-tab').forEach(t => t.classList.remove('tab-drop-left', 'tab-drop-right'));
    const tab = e.target.closest('.ws-editor-tab');
    if (tab && !tab.classList.contains('dragging')) {
      const rect = tab.getBoundingClientRect();
      if (e.clientX < rect.left + rect.width / 2) tab.classList.add('tab-drop-left');
      else tab.classList.add('tab-drop-right');
      return;
    }
    const group = e.target.closest('.ws-group');
    if (!group) return;
    const rect = group.getBoundingClientRect();
    const rx = (e.clientX - rect.left) / rect.width;
    const ry = (e.clientY - rect.top) / rect.height;
    let zone = 'center';
    const th = 0.25;
    if (ry < th) zone = 'top';
    else if (ry > 1 - th) zone = 'bottom';
    else if (rx < th) zone = 'left';
    else if (rx > 1 - th) zone = 'right';
    const zoneEl = group.querySelector('.ws-drop-zone.' + zone);
    if (zoneEl) zoneEl.classList.add('highlight');
  });
  el.addEventListener('drop', function(e) {
    e.preventDefault();
    if (!wsDragInfo) return;
    const { groupId: srcGid, filePath: fp } = wsDragInfo;
    const srcGroup = wsGetGroup(srcGid);
    if (!srcGroup) return;
    const tab = e.target.closest('.ws-editor-tab');
    if (tab && !tab.classList.contains('dragging')) {
      const tgtGid = parseInt(tab.dataset.group);
      const tgtIdx = parseInt(tab.dataset.idx);
      const tgtGroup = wsGetGroup(tgtGid);
      srcGroup.tabs = srcGroup.tabs.filter(t => t !== fp);
      if (srcGroup.active === fp) srcGroup.active = srcGroup.tabs[0] || null;
      const insertBefore = e.clientX < tab.getBoundingClientRect().left + tab.getBoundingClientRect().width / 2;
      const idx = insertBefore ? tgtIdx : tgtIdx + 1;
      if (tgtGid === srcGid) {
        const adjustedIdx = srcGroup.tabs.length >= tgtGroup.tabs.length ? idx : (idx > srcGroup.tabs.indexOf(fp) ? idx - 1 : idx);
        tgtGroup.tabs.splice(idx, 0, fp);
      } else {
        tgtGroup.tabs.splice(idx, 0, fp);
      }
      tgtGroup.active = fp;
      wsActiveGroupId = tgtGid;
      wsCleanupGroups();
      wsSyncVars();
      renderEditorLayout();
      wsTabDragEnd({ target: document.querySelector('.dragging') || document.body });
      return;
    }
    const zoneEl = e.target.closest('.ws-drop-zone');
    if (zoneEl) {
      const group = zoneEl.closest('.ws-group');
      const tgtGid = parseInt(group.dataset.group);
      const zone = zoneEl.dataset.drop;
      if (zone === 'center') {
        if (tgtGid === srcGid) return;
        const tgtGroup = wsGetGroup(tgtGid);
        srcGroup.tabs = srcGroup.tabs.filter(t => t !== fp);
        tgtGroup.tabs.push(fp);
        tgtGroup.active = fp;
        wsActiveGroupId = tgtGid;
      } else {
        srcGroup.tabs = srcGroup.tabs.filter(t => t !== fp);
        if (srcGroup.active === fp) srcGroup.active = srcGroup.tabs[0] || null;
        const newGroup = { id: wsNextGroupId++, tabs: [fp], active: fp, viewMode: 'content' };
        if (zone === 'right' || zone === 'left') wsSplitDir = 'horizontal';
        else wsSplitDir = 'vertical';
        const tgtIdx = wsGroups.findIndex(g => g.id === tgtGid);
        if (zone === 'right' || zone === 'bottom') wsGroups.splice(tgtIdx + 1, 0, newGroup);
        else wsGroups.splice(tgtIdx, 0, newGroup);
        wsActiveGroupId = newGroup.id;
      }
      wsCleanupGroups();
      wsSyncVars();
      renderEditorLayout();
      wsTabDragEnd({ target: document.querySelector('.dragging') || document.body });
    }
  });
}

function wsCleanupGroups() {
  wsGroups = wsGroups.filter(g => g.tabs.length > 0 || wsGroups.length === 1);
  if (!wsGroups.find(g => g.id === wsActiveGroupId)) wsActiveGroupId = wsGroups[0].id;
}

function renderMarkdown(md) {
  const codeBlocks = [];
  let html = md.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    const idx = codeBlocks.length;
    const langAttr = lang ? ' class="language-' + lang + '"' : '';
    const langLabel = lang ? '<div style="font-size:10px;color:var(--t4);margin-bottom:8px;font-weight:600;text-transform:uppercase">' + esc(lang) + '</div>' : '';
    codeBlocks.push(langLabel + '<pre><code' + langAttr + '>' + esc(code.replace(/^\n/, '')) + '</code></pre>');
    return '%%CODEBLOCK_' + idx + '%%';
  });
  html = esc(html);
  codeBlocks.forEach((block, i) => {
    html = html.replace('%%CODEBLOCK_' + i + '%%', block);
  });
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/^---$/gm, '<hr>');
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" onclick="event.preventDefault()">$1</a>');
  html = html.replace(/^(\s*)[-*] \[x\] (.+)$/gm, '$1<input type="checkbox" checked disabled>$2');
  html = html.replace(/^(\s*)[-*] \[ \] (.+)$/gm, '$1<input type="checkbox" disabled>$2');
  html = html.replace(/^(\s*)[-*] (.+)$/gm, '<li>$2</li>');
  html = html.replace(/^(\s*)\d+\. (.+)$/gm, '<li>$2</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');
  html = html.replace(/^(?!<[hbul]|<hr|<li|<code|<pre|<blockquote|<input|<img|<div)(.+)$/gm, function(m, c) {
    if (c.trim() === '') return '';
    return '<p>' + c + '</p>';
  });
  html = html.replace(/<p><\/p>/g, '');
  return html;
}

function highlight(code, ext) {
  return highlightWithGit(code, ext, null);
}

function highlightWithGit(code, ext, lineMap) {
  const lines = code.split('\n');
  return lines.map((l, i) => {
    const hl = syntaxHL(l, ext);
    const cls = lineMap ? (lineMap.get(i + 1) || '') : '';
    return `<div class="ws-line ${cls}"><span class="ws-gutter"></span><span class="ws-lnum">${i+1}</span>${hl}</div>`;
  }).join('');
}

function parseLineChanges(diffText) {
  const map = new Map();
  if (!diffText) return map;
  const lines = diffText.split('\n');
  let newLine = 0;
  let inHunk = false;
  let pendingDeletes = 0;
  for (const line of lines) {
    const hunkMatch = line.match(/^@@\s+-(\d+)(?:,\d+)?\s+\+(\d+)(?:,\d+)?\s+@@/);
    if (hunkMatch) {
      newLine = parseInt(hunkMatch[2], 10);
      inHunk = true;
      pendingDeletes = 0;
      continue;
    }
    if (!inHunk) continue;
    if (line.startsWith('diff --git') || line.startsWith('---') || line.startsWith('+++') || line.startsWith('index ')) {
      inHunk = false;
      continue;
    }
    if (line.startsWith('-')) {
      pendingDeletes++;
      continue;
    }
    if (line.startsWith('+')) {
      if (pendingDeletes > 0) {
        map.set(newLine, 'git-mod');
        pendingDeletes--;
      } else {
        map.set(newLine, 'git-add');
      }
      newLine++;
      continue;
    }
    pendingDeletes = 0;
    newLine++;
  }
  return map;
}

function syntaxHL(line, ext) {
  let s = esc(line);
  const kwSets = {
    js: ['const','let','var','function','return','if','else','for','while','class','import','export','from','default','new','this','async','await','try','catch','throw','typeof','instanceof','switch','case','break','continue','yield','of','in','true','false','null','undefined'],
    ts: ['const','let','var','function','return','if','else','for','while','class','import','export','from','default','new','this','async','await','interface','type','enum','extends','implements','readonly','as','is','keyof','infer','never','unknown','any','void','string','number','boolean','true','false','null','undefined'],
    py: ['def','class','return','if','elif','else','for','while','import','from','as','try','except','finally','with','raise','pass','break','continue','yield','lambda','True','False','None','and','or','not','in','is','global','nonlocal','assert','del'],
    rs: ['fn','let','mut','const','if','else','for','while','loop','match','return','struct','enum','impl','trait','pub','use','mod','crate','self','super','where','type','as','in','ref','move','async','await','true','false','None','Some','Ok','Err'],
    go: ['func','var','const','if','else','for','range','return','switch','case','default','type','struct','interface','map','chan','go','defer','select','package','import','true','false','nil','make','append','len','cap'],
    html: ['DOCTYPE','html','head','body','div','span','class','style','script','link','meta','src','href','type','id'],
    css: ['color','background','margin','padding','border','display','flex','grid','position','width','height','font','transition','animation','opacity','overflow','none','auto','solid','relative','absolute','fixed'],
    json: [],
    sh: ['function','if','then','else','fi','for','do','done','while','case','esac','echo','exit','return','export','source','local','readonly','true','false']
  };
  const kws = kwSets[ext] || kwSets['js'];
  if (kws.length) {
    const re = new RegExp('\\b(' + kws.join('|') + ')\\b', 'g');
    s = s.replace(re, '<span class="kw">$1</span>');
  }
  s = s.replace(/("(?:[^"\\]|\\.)*")/g, '<span class="str">$1</span>');
  s = s.replace(/('(?:[^'\\]|\\.)*')/g, '<span class="str">$1</span>');
  s = s.replace(/(`(?:[^`\\]|\\.)*`)/g, '<span class="str">$1</span>');
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
  s = s.replace(/(\/\/.*$)/gm, '<span class="cm">$1</span>');
  s = s.replace(/(#.*$)/gm, '<span class="cm">$1</span>');
  s = s.replace(/(\b\w+)\s*\(/g, '<span class="fn">$1</span>(');
  return s;
}

function renderInlineDiff(text) {
  if (!text) return '<div class="ws-empty">Keine Aenderungen</div>';
  const lines = text.split('\n');
  let html = '';
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith('diff --git') || line.startsWith('+++') || line.startsWith('---') || line.startsWith('index ') || line.startsWith('Binary')) {
      if (line.startsWith('diff --git')) html += `<div class="ws-line" style="background:var(--bg3);font-weight:600"><span class="ws-lnum"></span>${esc(line)}</div>`;
      i++; continue;
    }
    if (line.startsWith('@@')) { html += `<div class="ws-line" style="background:rgba(88,166,255,.08)"><span class="ws-lnum"></span><span style="color:var(--blue)">${esc(line)}</span></div>`; i++; continue; }
    if (line.startsWith('-')||line.startsWith('+')) {
      const dg=[], ag=[];
      while(i<lines.length&&lines[i].startsWith('-')&&!lines[i].startsWith('---')){dg.push(lines[i].slice(1));i++;}
      while(i<lines.length&&lines[i].startsWith('+')&&!lines[i].startsWith('+++')){ag.push(lines[i].slice(1));i++;}
      const pairs=Math.min(dg.length,ag.length);
      for(let p=0;p<pairs;p++){
        const cd=charDiff(dg[p],ag[p]);
        if(cd){
          html+=`<div class="ws-line git-del"><span class="ws-gutter"></span><span class="ws-lnum"></span>${renderCharDiffDel(cd)}</div>`;
          html+=`<div class="ws-line git-add"><span class="ws-gutter"></span><span class="ws-lnum"></span>${renderCharDiffAdd(cd)}</div>`;
        }else{
          html+=`<div class="ws-line git-del"><span class="ws-gutter"></span><span class="ws-lnum"></span>${esc(dg[p])}</div>`;
          html+=`<div class="ws-line git-add"><span class="ws-gutter"></span><span class="ws-lnum"></span>${esc(ag[p])}</div>`;
        }
      }
      for(let p=pairs;p<dg.length;p++) html+=`<div class="ws-line git-del"><span class="ws-gutter"></span><span class="ws-lnum"></span>${esc(dg[p])}</div>`;
      for(let p=pairs;p<ag.length;p++) html+=`<div class="ws-line git-add"><span class="ws-gutter"></span><span class="ws-lnum"></span>${esc(ag[p])}</div>`;
      continue;
    }
    html+=`<div class="ws-line"><span class="ws-lnum"></span><span style="color:var(--t2)">${esc(line.startsWith(' ')?line.slice(1):line)}</span></div>`;
    i++;
  }
  return html;
}

// =================== COMMITS ===================
function renderCommits(log) {
  const el = document.getElementById('p-commits');
  if (!log.length) { el.innerHTML = '<div class="empty-msg">Keine Commits</div>'; return; }
  el.innerHTML = log.map(c => {
    const refs = parseRefs(c.refs);
    const pb = c.pushed ? '<span class="push-badge pushed">PUSHED</span>' : (c.localOnly ? '<span class="push-badge local">LOCAL</span>' : '');
    return `<div class="commit" onclick="showDiff('${c.hash}')"><span class="hash">${c.hashShort}</span>${pb}${refs}<span class="msg">${esc(c.message)}</span><span class="author">${esc(c.author)}</span><span class="date">${fmtDate(c.date)}</span></div>`;
  }).join('');
}

function filterCommits(q) {
  const ql = q.toLowerCase();
  renderCommits(commits.filter(c => c.message.toLowerCase().includes(ql) || c.hash.includes(ql) || c.author.toLowerCase().includes(ql)));
}

function parseRefs(refs) {
  if (!refs) return '';
  return refs.split(',').map(r => r.trim()).filter(Boolean).map(r => {
    let cls = '';
    if (r.startsWith('tag:')) cls = 'tag';
    else if (r.includes('/')) cls = 'remote';
    return `<span class="ref ${cls}">${esc(r.replace('tag: ','').replace('-> ',''))}</span>`;
  }).join('');
}

// =================== PUSH ===================
function renderPushOverview(log, status) {
  const el = document.getElementById('p-push');
  const pushed = log.filter(c => c.pushed).length;
  const local = log.filter(c => c.localOnly).length;
  const total = log.length;
  const hasRemote = status.tracking && status.tracking.length > 0;
  if (!hasRemote) {
    el.innerHTML = `<div class="push-summary"><div class="push-stat"><span class="num">${total}</span><span class="lbl">Commits (kein Remote)</span></div></div>
    ${log.map(c => `<div class="commit" onclick="showDiff('${c.hash}')"><span class="hash">${c.hashShort}</span><span class="push-badge local">LOCAL</span>${parseRefs(c.refs)}<span class="msg">${esc(c.message)}</span><span class="author">${esc(c.author)}</span><span class="date">${fmtDate(c.date)}</span></div>`).join('')}`;
    return;
  }
  const pushPct = total > 0 ? (pushed / total * 100) : 100;
  el.innerHTML = `<div class="push-summary">
    <div class="push-stat s-local"><span class="num">${local}</span><span class="lbl">Nur lokal</span></div>
    <div class="push-stat s-pushed"><span class="num">${pushed}</span><span class="lbl">Gepusht</span></div>
    <div class="push-stat s-behind"><span class="num">${status.behind}</span><span class="lbl">Behind</span></div>
  </div>
  <div class="push-bar"><div class="seg-pushed" style="width:${pushPct}%"></div><div class="seg-local" style="width:${100-pushPct}%"></div></div>
  <div class="push-legend"><span><span class="dot-g"></span> ${pushPct.toFixed(0)}% gepusht</span><span><span class="dot-r"></span> ${local} nur lokal</span></div>
  ${local > 0 ? `<div class="section-title" style="margin-top:16px">Nicht gepusht (${local})</div>${log.filter(c=>c.localOnly).map(c=>`<div class="commit" onclick="showDiff('${c.hash}')"><span class="hash">${c.hashShort}</span><span class="push-badge local">LOCAL</span>${parseRefs(c.refs)}<span class="msg">${esc(c.message)}</span><span class="author">${esc(c.author)}</span><span class="date">${fmtDate(c.date)}</span></div>`).join('')}` : '<div class="empty-msg" style="color:var(--green);padding:20px">Alles gepusht!</div>'}`;
}

// =================== STATUS ===================
function renderStatus(s) {
  const el = document.getElementById('p-status');
  let h = '';
  const sections = [
    { label:'Staged', items: s.staged, badge:'S', cls:'S' },
    { label:'Neu', items: s.created, badge:'A', cls:'A' },
    { label:'Geandert', items: s.modified, badge:'M', cls:'M' },
    { label:'Geloscht', items: s.deleted, badge:'D', cls:'D' },
    { label:'Umbenannt', items: s.renamed, badge:'R', cls:'R' },
    { label:'Konflikte', items: s.conflicted, badge:'!', cls:'M' }
  ];
  for (const sec of sections) {
    if (!sec.items.length) continue;
    h += `<div class="status-section"><h4>${sec.label} (${sec.items.length})</h4>`;
    for (const f of sec.items) h += `<div class="status-file" onclick="wsOpenFile('${esc(f)}');switchTab('workspace')" oncontextmenu="fileContextMenu(event,'${esc(f)}')"><span class="sbadge ${sec.cls}">${sec.badge}</span><span class="spath">${esc(f)}</span></div>`;
    h += '</div>';
  }
  if (!h) h = '<div class="empty-msg" style="color:var(--green);padding:40px">Arbeitsverzeichnis sauber</div>';
  el.innerHTML = h;
}

async function loadInsights() {
  const [authorsData, activityData] = await Promise.all([LG.authors(repo), LG.recentActivity(repo)]);
  const el = document.getElementById('p-insights');
  const colors = ['#58a6ff','#bc8cff','#3fb950','#d29922','#f85149','#39d2c0','#f778ba'];
  const total = authorsData.total || 1;
  const maxCommits = (authorsData.authors[0] || {}).commits || 1;
  let authorHtml = (authorsData.authors||[]).map((a,i) => {
    const pct = (a.commits/total*100).toFixed(1);
    return `<div class="author-row"><span class="author-name">${esc(a.name)}</span><div style="flex:1;background:var(--bg3);border-radius:4px;height:8px;overflow:hidden"><div class="author-bar" style="width:${a.commits/maxCommits*100}%;background:${colors[i%colors.length]}"></div></div><span class="author-count">${a.commits}</span><span class="author-count">${pct}%</span></div>`;
  }).join('');
  const days = activityData.days||[];
  const maxDay = Math.max(...days.map(d=>d.count),1);
  let actHtml = days.map(d => {
    const h = Math.max(4, d.count/maxDay*100);

  }).join('');
  el.innerHTML = `<div class="section-title">Statistik</div>
  <div class="stat-grid">
    <div class="stat-card"><h4>Commits</h4><div class="big" style="color:var(--blue)">${commits.length}</div><div class="sub">Gesamt</div></div>
    <div class="stat-card"><h4>Autoren</h4><div class="big" style="color:var(--purple)">${authorsData.authors.length}</div><div class="sub">Beitragende</div></div>
    <div class="stat-card"><h4>Aktive Tage</h4><div class="big" style="color:var(--green)">${days.length}</div><div class="sub">Letzte 30 Tage</div></div>
  </div>
  <div class="section-title">Aktivitat</div><div class="activity-chart">${actHtml||'<div class="empty-msg" style="width:100%">Keine</div>'}</div>
  <div class="section-title">Autoren</div><div class="author-list">${authorHtml}</div>

async function showDiff(hash) {
  const c = commits.find(x => x.hash === hash);
  document.getElementById('diffTitle').textContent = c ? `${c.hashShort} - ${c.message.split('\n')[0]}` : hash;
  document.getElementById('diffBody').innerHTML = '<div class="empty-msg">Lade...</div>';
  document.getElementById('diffModal').style.display = 'flex';
  const d = await LG.commitDiff(repo, hash);
  document.getElementById('diffBody').innerHTML = d.error ? `<div class="empty-msg">${esc(d.error)}</div>` : renderDiff(d.diff);
}

async function showFileDiff(fp) { await wsOpenFile(fp); switchTab('workspace'); const g = wsActiveGroup(); if (g) { g.viewMode = 'diff'; wsSyncVars(); renderEditorLayout(); } }

function renderDiff(text) {
  if (!text) return '<div class="empty-msg">Keine Aenderungen</div>';
  const lines = text.split('\n');
  let html = '', inD = false, adds = 0, dels = 0;
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith('diff --git')) {
      if (inD) html += '</div>';
      const m = line.match(/b\/(.+)$/);
      html += `<div class="dfile">${esc(m?m[1]:line)} <span class="stats"><span class="dstats-a">+${adds}</span><span class="dstats-d">-${dels}</span></span></div><div>`;
      inD=true;adds=0;dels=0;i++;continue;
    }
    if (line.startsWith('@@')){html+=`<div class="dline hunk"><span class="ln"></span><span class="lc">${esc(line)}</span></div>`;i++;continue;}
    if (line.startsWith('+++')||line.startsWith('---')||line.startsWith('index ')||line.startsWith('Binary')){i++;continue;}
    if (line.startsWith('-')||line.startsWith('+')) {
      const dg=[], ag=[];
      while(i<lines.length&&lines[i].startsWith('-')&&!lines[i].startsWith('---')){dg.push(lines[i].slice(1));i++;}
      while(i<lines.length&&lines[i].startsWith('+')&&!lines[i].startsWith('+++')){ag.push(lines[i].slice(1));i++;}
      const pairs=Math.min(dg.length,ag.length);
      for(let p=0;p<pairs;p++){
        dels++;adds++;
        const cd=charDiff(dg[p],ag[p]);
        if(cd){
          html+=`<div class="dline del"><span class="ln"></span><span class="lc">${renderCharDiffDel(cd)}</span></div>`;
          html+=`<div class="dline add"><span class="ln"></span><span class="lc">${renderCharDiffAdd(cd)}</span></div>`;
        }else{
          html+=`<div class="dline del"><span class="ln"></span><span class="lc">${esc(dg[p])}</span></div>`;
          html+=`<div class="dline add"><span class="ln"></span><span class="lc">${esc(ag[p])}</span></div>`;
        }
      }
      for(let p=pairs;p<dg.length;p++){dels++;html+=`<div class="dline del"><span class="ln"></span><span class="lc">${esc(dg[p])}</span></div>`;}
      for(let p=pairs;p<ag.length;p++){adds++;html+=`<div class="dline add"><span class="ln"></span><span class="lc">${esc(ag[p])}</span></div>`;}
      continue;
    }
    const ctx=line.startsWith(' ')?line.slice(1):line;
    html+=`<div class="dline ctx"><span class="ln"></span><span class="lc">${esc(ctx)}</span></div>`;
    i++;
  }
  if(inD)html+='</div>';
  return html;
}

// =================== CONTEXT MENU ===================
async function fileContextMenu(e, filePath) {
  e.preventDefault();e.stopPropagation();
  const fullPath = repo+'/'+filePath.replace(/\//g,'\\');
  const action = await LG.contextMenu([
    {id:'open-explorer',label:'Im Ordner offnen'},
    {id:'open-file',label:'Datei offnen'},
    {id:'copy-path',label:'Pfad kopieren'},
    {id:'show-diff',label:'Diff anzeigen'}
  ]);
  if(!action)return;
  if(action==='open-explorer')LG.showInFolder(fullPath);
  else if(action==='open-file')LG.openPath(fullPath);
  else if(action==='copy-path')navigator.clipboard.writeText(fullPath);
  else if(action==='show-diff')showFileDiff(filePath);
}

// =================== TOASTS ===================
function showToast(type, file) {
  const c = document.getElementById('toasts');
  const labels={add:'+ Neu',change:'~ Geandert',unlink:'- Geloscht'};
  const t = document.createElement('div');
  t.className=`toast t-${type==='unlink'?'del':type}`;
  t.innerHTML=`<span>${labels[type]||type}</span><span style="font-family:'Cascadia Code','Consolas',monospace;font-size:11px;opacity:.7">${esc(file)}</span>`;
  t.onclick=()=>t.remove();
  c.appendChild(t);
  setTimeout(()=>{if(t.parentNode)t.remove();},4000);
  while(c.children.length>5)c.removeChild(c.firstChild);
}

// =================== RESIZERS ===================
(function initResizers() {
  let dragType = null, startPos = 0, startSize = 0, target = null;

  function onDown(e, type) {
    e.preventDefault();
    dragType = type;
    const ev = e.touches ? e.touches[0] : e;
    if (type === 'v') {
      startPos = ev.clientX;
      startSize = document.querySelector('.ws-sidebar').offsetWidth;
      target = document.querySelector('.ws-sidebar');
      document.getElementById('resizerV').classList.add('active');
    } else {
      startPos = ev.clientY;
      startSize = document.getElementById('wsBottomPanel').offsetHeight;
      target = document.getElementById('wsBottomPanel');
      document.getElementById('resizerH').classList.add('active');
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
    document.body.style.cursor = type === 'v' ? 'col-resize' : 'row-resize';
    document.body.style.userSelect = 'none';
  }

  function onMove(e) {
    if (!dragType) return;
    e.preventDefault();
    const ev = e.touches ? e.touches[0] : e;
    if (dragType === 'v') {
      const dx = ev.clientX - startPos;
      const nw = Math.max(160, Math.min(600, startSize + dx));
      target.style.width = nw + 'px';
    } else {
      const dy = startPos - ev.clientY;
      const nh = Math.max(60, Math.min(500, startSize + dy));
      target.style.height = nh + 'px';
    }
  }

  function onUp() {
    if (!dragType) return;
    document.getElementById('resizerV').classList.remove('active');
    document.getElementById('resizerH').classList.remove('active');
    dragType = null;
    target = null;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
  }

  document.addEventListener('DOMContentLoaded', () => {
    const rv = document.getElementById('resizerV');
    const rh = document.getElementById('resizerH');
    if (rv) { rv.addEventListener('mousedown', e => onDown(e, 'v')); rv.addEventListener('touchstart', e => onDown(e, 'v'), { passive: false }); }
    if (rh) { rh.addEventListener('mousedown', e => onDown(e, 'h')); rh.addEventListener('touchstart', e => onDown(e, 'h'), { passive: false }); }
  });
})();

let _grpResize = null;
function initGroupResizers() {
  document.querySelectorAll('[data-group-resizer]').forEach(rv => {

      e.preventDefault();
      const resizerEl = rv;
      resizerEl.classList.add('active');

      const groupEl = rv.previousElementSibling;
      const isHoriz = wsSplitDir === 'horizontal';
      const startPos = isHoriz ? e.clientX : e.clientY;
      const startSize = isHoriz ? groupEl.offsetWidth : groupEl.offsetHeight;
      document.body.style.cursor = isHoriz ? 'col-resize' : 'row-resize';
      document.body.style.userSelect = 'none';
      function onMove(e2) {
        const delta = isHoriz ? (e2.clientX - startPos) : (e2.clientY - startPos);
        const ns = Math.max(120, startSize + delta);
        if (isHoriz) groupEl.style.flex = 'none'; 
        groupEl.style[isHoriz ? 'width' : 'height'] = ns + 'px';
      }
      function onUp() {
        resizerEl.classList.remove('active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    };
  });
}
