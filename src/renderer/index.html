// =================== LIVE CHANGES ===================
LG.onLiveChange(async (data) => {
  if (!repo) return;
  const evtMap = {add:'add',change:'change',unlink:'unlink',addDir:'add',unlinkDir:'unlink'};
  const evtType = evtMap[data.event] || 'change';

  if (data.event !== 'addDir' && data.event !== 'unlinkDir') showToast(evtType, data.file);

  // workspace live strip
  const strip = document.getElementById('wsLiveStrip');
  const icon = data.event === 'add' ? '+' : data.event === 'unlink' ? '-' : '~';
  const cls = data.event === 'add' ? 'add' : data.event === 'unlink' ? 'unlink' : 'change';
  const time = new Date(data.timestamp).toLocaleTimeString('de-DE');
  const evDiv = document.createElement('div');
  evDiv.className = 'ws-live-event';
  evDiv.innerHTML = `<span class="le-icon ${cls}">${icon}</span><span class="le-file" onclick="wsOpenFile('${esc(data.file)}')">${esc(data.file)}</span><span class="le-time">${time}</span>`;
  strip.insertBefore(evDiv, strip.firstChild);
  while (strip.children.length > 30) strip.removeChild(strip.lastChild);

  // LIVE TAB feed
  const info = evtLabels[data.event] || {icon:'?',label:data.event.toUpperCase(),cls:'t-change',ecls:'evt-change'};
  const feed = document.getElementById('liveFeed');
  const empty = feed.querySelector('.empty-msg');
  if (empty) empty.remove();
  const canDiff = data.event === 'change' || data.event === 'add';

  const div = document.createElement('div');
  div.className = `live-event ${info.ecls}`;
  div.dataset.file = data.file;

  const linesHtml = canDiff ? '<span class="live-lines" data-pending="1"><span class="ll-a">...</span></span>' : '';

  div.innerHTML = `
    <div class="live-event-header">
      ${canDiff ? '<span class="live-chevron">&#9654;</span>' : '<span style="width:16px"></span>'}
      <span class="live-icon">${info.icon}</span>
      <div class="live-body">
        <div class="live-top"><span class="live-type ${info.cls}">${info.label}</span><span class="live-file">${esc(data.file)}</span></div>
        <div class="live-meta"><span class="live-time">${time}</span>${linesHtml}</div>
      </div>
    </div>
    ${canDiff ? '<div class="live-diff-area"></div>' : ''}`;

  div.querySelector('.live-event-header').addEventListener('click', () => { if (canDiff) toggleLiveEvent(div); });
  div.querySelector('.live-event-header').addEventListener('contextmenu', (e) => renderLiveContextMenu(e, data.file));
  feed.insertBefore(div, feed.firstChild);

  if (canDiff) {
    LG.diffStats(repo, data.file).then(stats => {
      const linesEl = div.querySelector('.live-lines');
      if (linesEl) linesEl.innerHTML = `<span class="ll-a">+${stats.adds}</span><span class="ll-d">-${stats.dels}</span>`;
    });
  }

  while (feed.children.length > 80) feed.removeChild(feed.lastChild);

  // auto-refresh code viewer
  wsGroups.forEach(g => {
    if (g.active === data.file && (data.event === 'change' || data.event === 'add')) {
      wsLoadContentSilent(g.id);
    }
  });

  const mod = document.getElementById('iModified');
  if (data.event === 'change' || data.event === 'unlink') mod.textContent = parseInt(mod.textContent || '0') + 1;

  loadChangesOverview();
});

// =================== COMPARE (side-by-side diff) ===================
function populateCompareSelects() {
  const opts = '<option value="">-- Commit wahlen --</option>' +
    '<option value="WORKING">AKTUELL (Working Tree)</option>' +
    commits.map(c => `<option value="${c.hash}">${c.hashShort} ${esc(c.message.split('\n')[0].substring(0,50))}</option>`).join('');
  document.getElementById('cmpFrom').innerHTML = opts;
  document.getElementById('cmpTo').innerHTML = opts;
  if (commits.length >= 2) {
    document.getElementById('cmpFrom').value = commits[1].hash;
    document.getElementById('cmpTo').value = commits[0].hash;
  } else if (commits.length === 1) {
    document.getElementById('cmpFrom').value = commits[0].hash;
    document.getElementById('cmpTo').value = 'WORKING';
  }
  runCompare();
}

async function runCompare() {
  const from = document.getElementById('cmpFrom').value;
  const to = document.getElementById('cmpTo').value;
  const stats = document.getElementById('cmpStats');
  const fileList = document.getElementById('cmpFileList');
  const wrap = document.getElementById('cmpDiffWrap');

  if (!from || !to || from === to) {
    stats.innerHTML = '';
    fileList.innerHTML = '<div class="cmp-fl-head">Geanderte Dateien</div>';
    wrap.innerHTML = '<div class="cmp-empty-msg">Zwei verschiedene Versionen auswaehlen</div>';
    return;
  }

  const fromLabel = from === 'WORKING' ? 'Working Tree' : document.getElementById('cmpFrom').selectedOptions[0].text.substring(0, 30);
  const toLabel = to === 'WORKING' ? 'Working Tree' : document.getElementById('cmpTo').selectedOptions[0].text.substring(0, 30);
  stats.innerHTML = '<span style="color:var(--t3)">Lade...</span>';

  try {
    const d = await LG.compare(repo, from, to);
    if (d.error) { wrap.innerHTML = `<div class="cmp-empty-msg">${esc(d.error)}</div>`; stats.innerHTML = ''; return; }

    const totalA = d.files.reduce((s, f) => s + f.adds, 0);
    const totalD = d.files.reduce((s, f) => s + f.dels, 0);
    stats.innerHTML = `<span class="cs-f">${d.files.length} Dateien</span><span class="cs-a">+${totalA}</span><span class="cs-d">-${totalD}</span>`;

    window._cmpDiffText = d.diff;
    window._cmpFiles = d.files;
    window._cmpFrom = from;
    window._cmpTo = to;
    window._cmpFromLabel = fromLabel;
    window._cmpToLabel = toLabel;

    if (!d.files.length) {
      fileList.innerHTML = '<div class="cmp-fl-head">Geanderte Dateien</div><div class="cmp-empty-msg" style="padding:20px;color:var(--green)">Keine Unterschiede</div>';
      wrap.innerHTML = '<div class="cmp-empty-msg" style="color:var(--green)">Identisch - keine Unterschiede</div>';
      return;
    }

    fileList.innerHTML = '<div class="cmp-fl-head">Geanderte Dateien (' + d.files.length + ')</div>' +
      d.files.map((f, i) => `<div class="cmp-fi ${i===0?'active':''}" onclick="showCmpFile(${i},this)" oncontextmenu="fileContextMenu(event,'${esc(f.file)}')">
        <span class="cfi-icon">${fileIcon(f.file)}</span>
        <span class="cfi-name">${esc(f.file.split('/').pop())}</span>
        <span class="cfi-stats">${f.adds?`<span class="cfi-a">+${f.adds}</span>`:''}${f.dels?`<span class="cfi-d">-${f.dels}</span>`:''}</span>
      </div>`).join('');

    showCmpFile(0);
  } catch (err) {
    stats.innerHTML = '';
    wrap.innerHTML = `<div class="cmp-empty-msg">Fehler: ${esc(err.message)}</div>`;
  }
}

function showCmpFile(idx, el) {
  if (el) {
    document.querySelectorAll('.cmp-fi').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
  }
  const files = window._cmpFiles || [];
  const diffText = window._cmpDiffText || '';
  if (!files[idx]) return;
  const file = files[idx].file;
  const fileDiff = extractFileDiff(diffText, file);
  renderSideBySide(fileDiff, file);
}

function extractFileDiff(fullDiff, fileName) {
  const lines = fullDiff.split('\n');
  let capturing = false;
  let result = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith('diff --git')) {
      if (capturing) break;
      const m = line.match(/b\/(.+)$/);
      if (m && m[1] === fileName) capturing = true;
    }
    if (capturing) result.push(line);
  }
  return result.join('\n');
}

function renderSideBySide(diffText, fileName) {
  const wrap = document.getElementById('cmpDiffWrap');
  if (!diffText) {
    wrap.innerHTML = `<div class="cmp-empty-msg">Kein Diff fuer ${esc(fileName)}</div>`;
    return;
  }

  const lines = diffText.split('\n');
  let leftNum = 0, rightNum = 0;
  const left = [], right = [];

  for (const line of lines) {
    if (line.startsWith('diff --git') || line.startsWith('index ') || line.startsWith('Binary') || line.startsWith('--- ') || line.startsWith('+++ ')) continue;
    if (line.startsWith('@@')) {
      const lm = line.match(/@@ -(\d+)/); if (lm) leftNum = parseInt(lm[1]) - 1;
      const rm = line.match(/\+(\d+)/); if (rm) rightNum = parseInt(rm[1]) - 1;
      left.push({ t: 'hdr', n: '', s: line });
      right.push({ t: 'hdr', n: '', s: line });
      continue;
    }
    if (line.startsWith('+')) {
      rightNum++;
      right.push({ t: 'add', n: rightNum, s: line.slice(1) });
    } else if (line.startsWith('-')) {
      leftNum++;
      left.push({ t: 'del', n: leftNum, s: line.slice(1) });
    } else {
      leftNum++; rightNum++;
      const c = line.startsWith(' ') ? line.slice(1) : line;
      left.push({ t: 'ctx', n: leftNum, s: c });
      right.push({ t: 'ctx', n: rightNum, s: c });
    }
  }

  // align: pair del/add blocks, pad shorter side
  const alignedL = [], alignedR = [];
  let li = 0, ri = 0;
  while (li < left.length || ri < right.length) {
    const lv = left[li], rv = right[ri];
    if (!lv) { alignedL.push(null); alignedR.push(rv); ri++; continue; }
    if (!rv) { alignedL.push(lv); alignedR.push(null); ri++; continue; }
    if (lv.t === 'hdr' && rv.t === 'hdr') { alignedL.push(lv); alignedR.push(rv); li++; ri++; continue; }
    if (lv.t === 'ctx' && rv.t === 'ctx') { alignedL.push(lv); alignedR.push(rv); li++; ri++; continue; }
    if (lv.t === 'del') {
      if (rv && rv.t === 'add') {
        const cd = charDiff(lv.s, rv.s);
        alignedL.push({...lv, cd}); alignedR.push({...rv, cd});
      } else {
        alignedL.push(lv); alignedR.push(null);
      }
      li++; if (rv && rv.t === 'add') ri++; continue;
    }
    if (rv.t === 'add') { alignedL.push(lv && lv.t === 'del' ? lv : null); alignedR.push(rv); if (lv && lv.t !== 'del') li++; ri++; continue; }
    alignedL.push(lv); alignedR.push(rv); li++; ri++;
  }

  let leftHtml = '', rightHtml = '';
  for (let i = 0; i < alignedL.length; i++) {
    const lv = alignedL[i], rv = alignedR[i];
    leftHtml += cmpLine(lv ? lv.t : 'empty', lv ? lv.n : '', lv ? lv.s : '', lv ? lv.cd : null);
    rightHtml += cmpLine(rv ? rv.t : 'empty', rv ? rv.n : '', rv ? rv.s : '', rv ? rv.cd : null);
  }

  wrap.innerHTML = `<div class="cmp-split" id="cmpSplit">
    <div class="cmp-side" id="cmpSideL" onscroll="cmpSyncScroll('L')">
      <div class="cmp-side-head"><span style="color:var(--red)">&#8592;</span> <span class="csh-file">${esc(window._cmpFromLabel || 'Von')}</span></div>
      ${leftHtml}
    </div>
    <div class="cmp-v-resizer" id="cmpVResizer"></div>
    <div class="cmp-side" id="cmpSideR" onscroll="cmpSyncScroll('R')">
      <div class="cmp-side-head"><span style="color:var(--green)">&#8594;</span> <span class="csh-file">${esc(window._cmpToLabel || 'Nach')}</span></div>
      ${rightHtml}
    </div>
  </div>`;
  initCmpResizer();
  initCmpSyncScroll();
}

function cmpLine(type, num, text, cd) {
  let content = esc(text);
  if (cd) {
    if (type === 'del') content = renderCharDiffDel(cd);
    else if (type === 'add') content = renderCharDiffAdd(cd);
  }
  return `<div class="cmp-line ${type}"><span class="cln">${num || ''}</span><span class="ctext">${content}</span></div>`;
}

let _cmpSyncLock = null;
function cmpSyncScroll(side) {
  if (_cmpSyncLock && _cmpSyncLock !== side) return;
  _cmpSyncLock = side;
  const l = document.getElementById('cmpSideL');
  const r = document.getElementById('cmpSideR');
  if (!l || !r) return;
  if (side === 'L') { r.scrollTop = l.scrollTop; }
  else { l.scrollTop = r.scrollTop; }
  requestAnimationFrame(() => { _cmpSyncLock = null; });
}

function initCmpSyncScroll() {
  const l = document.getElementById('cmpSideL');
  const r = document.getElementById('cmpSideR');
  if (l) l.scrollTop = 0;
  if (r) r.scrollTop = 0;
}

function initCmpResizer() {
  const rv = document.getElementById('cmpVResizer');
  const l = document.getElementById('cmpSideL');
  if (!rv || !l) return;
  rv.onmousedown = function(e) {
    e.preventDefault();
    rv.classList.add('active');
    const split = rv.parentElement;
    const totalW = split.offsetWidth - 5;
    const startX = e.clientX;
    const startLW = l.offsetWidth;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    function onMove(e2) {
      const delta = e2.clientX - startX;
      const nw = Math.max(120, Math.min(totalW - 120, startLW + delta));
      l.style.flex = 'none';
      l.style.width = nw + 'px';
    }
    function onUp() {
      rv.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };
}

// =================== LIVE TAB ===================
const evtLabels = {
  add:{icon:'+',label:'NEU',cls:'t-add',ecls:'evt-add'},
  change:{icon:'~',label:'GEANDERT',cls:'t-change',ecls:'evt-change'},
  unlink:{icon:'-',label:'GELOSCHT',cls:'t-unlink',ecls:'evt-unlink'},
  addDir:{icon:'+',label:'NEUER ORDNER',cls:'t-add',ecls:'evt-add'},
  unlinkDir:{icon:'-',label:'ORDNER GELOSCHT',cls:'t-unlink',ecls:'evt-unlink'}
};

function toggleLiveEvent(el) {
  const was = el.classList.contains('expanded');
  el.classList.toggle('expanded');
  if (!was) {
    const area = el.querySelector('.live-diff-area');
    if (area && !area.dataset.loaded) loadInlineDiff(el, area);
  }
}

async function loadInlineDiff(el, area) {
  const fp = el.dataset.file;
  area.dataset.loaded = '1';
  area.innerHTML = '<div class="live-diff-loading">Lade Diff...</div>';
  const d = await LG.fileDiff(repo, fp);
  area.innerHTML = d.diff ? renderDiff(d.diff) : '<div class="live-diff-loading">Keine Aenderungen gegenueber Git</div>';
}

function renderLiveContextMenu(e, fp) {
  e.preventDefault(); e.stopPropagation();
  fileContextMenu(e, fp);
}
function fileIcon(n) {
  const ext = n.split('.').pop().toLowerCase();
  const m = {js:'&#128220;',ts:'&#128220;',jsx:'&#128220;',tsx:'&#128220;',py:'&#128013;',rs:'&#9881;',go:'&#128230;',html:'&#127760;',css:'&#127912;',json:'&#128203;',md:'&#128196;',yml:'&#128203;',yaml:'&#128203;',sh:'&#128423;',bat:'&#128423;',sql:'&#128451;',png:'&#128247;',jpg:'&#128247;',svg:'&#127912;',gif:'&#128247;',exe:'&#9881;',dll:'&#9881;',toml:'&#128203;',lock:'&#128274;',env:'&#128274;'};
  return m[ext] || '&#128196;';
}

function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtDate(d) {
  try {
    const dt=new Date(d),now=new Date(),ms=now-dt;
    const m=Math.floor(ms/60000),h=Math.floor(ms/3600000),dy=Math.floor(ms/86400000);
    if(m<1)return 'jetzt';if(m<60)return m+' Min.';if(h<24)return h+' Std.';if(dy<7)return dy+' Tage';
    return dt.toLocaleDateString('de-DE');
  } catch{return d;}
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.target.tagName === 'INPUT') return;
  const tabs = ['workspace','commits','compare','push','status','live','insights'];
  if (e.ctrlKey && e.key === 'f') { e.preventDefault(); document.getElementById('searchInput').focus(); }
  if (e.key === 'r' && !e.ctrlKey) refreshRepo();
  if (e.key === 'o' && !e.ctrlKey) browseFolder();
  const idx = parseInt(e.key);
  if (idx >= 1 && idx <= tabs.length) switchTab(tabs[idx-1]);
});
